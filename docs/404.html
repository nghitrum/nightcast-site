<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect — routes /privacy and /terms to their HTML files
    var path = window.location.pathname;
    if (path === '/privacy' || path === '/privacy/') {
      window.location.replace('/privacy.html');
    } else if (path === '/terms' || path === '/terms/') {
      window.location.replace('/terms.html');
    } else if (path === '/delete-account' || path === '/delete-account/') {
      window.location.replace('/delete-account.html');
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
